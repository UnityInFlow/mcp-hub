name: Release

# Trigger: push a v* tag (e.g., git tag v0.1.1 && git push origin v0.1.1)
# NOTE: 0.1.0 is already published on crates.io (immutable); this pipeline ships
# the binstall-metadata + prebuilt-binaries release as 0.1.1 (03-TOOLING-PINS.md).
# This produces downloadable, cargo-binstall-resolvable binaries for 5 targets
# (Linux x86_64/aarch64 gnu + musl, Windows x86_64) and publishes the crate to
# crates.io -- all without manual intervention. The deliberate v* tag + the
# preflight dry-run ARE the gate (crates.io publish is immediate and yank-only;
# there is no reviewable staging bundle, so there is intentionally NO human gate).
on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  # Pinned toolchain for cargo-zigbuild cross-compilation (see 03-TOOLING-PINS.md).
  # NEVER use "latest" -- zig <-> cargo-zigbuild compatibility is version-coupled.
  ZIG_VERSION: '0.14.1'
  CARGO_ZIGBUILD_VERSION: '0.23.0'

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1: preflight
  # Validates that the git tag version matches Cargo.toml version, and that
  # cargo publish --dry-run passes. Fails fast on any mismatch.
  # Addresses: tag/version consistency, dry-run before release.
  # ──────────────────────────────────────────────────────────────────────────
  preflight:
    name: Preflight (tag/version check + publish dry-run)
    runs-on: [orangepi]
    outputs:
      version: ${{ steps.extract-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Validate tag matches Cargo.toml version
        id: extract-version
        run: |
          TAG="${GITHUB_REF##refs/tags/}"
          VERSION="${TAG#v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')

          echo "Git tag version:    ${VERSION}"
          echo "Cargo.toml version: ${CARGO_VERSION}"

          if [ "${VERSION}" != "${CARGO_VERSION}" ]; then
            echo "ERROR: Git tag version '${VERSION}' does not match Cargo.toml version '${CARGO_VERSION}'"
            echo "Fix: Update Cargo.toml version to match the tag before pushing."
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Tag/version check passed: v${VERSION}"

      - name: cargo publish --dry-run
        run: cargo publish --dry-run --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2: test
  # Full test gate: cargo test + clippy + fmt check.
  # Build jobs do not start until this passes.
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Test gate (test + clippy + fmt)
    needs: preflight
    runs-on: [orangepi]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: cargo test
        run: cargo test --locked

      - name: cargo clippy
        run: cargo clippy -- -D warnings

      - name: cargo fmt check
        run: cargo fmt --check

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 3: build-binaries
  # ONE self-hosted Linux runner cross-compiles ALL 5 targets via cargo-zigbuild
  # (zig is host-arch-independent, so this whole matrix runs on a single Linux
  # host -- no per-arch runner, no Docker/cross, no macОS runner). Replaces the
  # old native build-linux-x64 (cross disabled) + build-linux-arm64 jobs.
  #
  # Runner: default [arc-runner-unityinflow]. The Hetzner X64 fleet has been
  # intermittently offline across Phases 1-2; because zigbuild is host-arch-
  # independent the entire matrix (incl. x86_64 + Windows) can also run on the
  # ARM64 orangepi runner -- to flip, change `runs-on` below to [orangepi].
  #
  # Assets are named after the CRATE (`mcp-server-hub-<target>-v<version>.<ext>`),
  # NOT the binary (`mcp-hub`), so cargo binstall's default {name} template
  # (name = crate = mcp-server-hub) resolves them (D-02 / HUB-04).
  #
  # macOS is deferred to v2 (D-06 / HUB-V2-01) -- no macOS target here.
  # Windows is a REDUCED non-unix CLI: nix/axum/dirs/comfy-table/owo-colors/
  # dialoguer/tower-http/askama are [target.'cfg(unix)'.dependencies], so the
  # Windows binary has no daemon/web-UI/signal handling -- documented in the
  # release notes + README, smoke-tested by build success + presence of the
  # .exe in the archive (it is not runnable on the Linux build host).
  # ──────────────────────────────────────────────────────────────────────────
  build-binaries:
    name: Build ${{ matrix.target }}
    needs: test
    runs-on: [orangepi]   # flip to [orangepi] if Hetzner X64 fleet is offline (zigbuild is host-arch-independent)
    strategy:
      fail-fast: true                   # a partial binary set is a broken release -- fail the whole matrix
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            ext: tgz
          - target: aarch64-unknown-linux-gnu
            ext: tgz
          - target: x86_64-unknown-linux-musl
            ext: tgz
          - target: aarch64-unknown-linux-musl
            ext: tgz
          - target: x86_64-pc-windows-gnu
            ext: zip
            binext: '.exe'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust stable + target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install pinned zig + cargo-zigbuild
        run: |
          # Pinned versions (03-TOOLING-PINS.md): zig 0.14.1, cargo-zigbuild 0.23.0.
          # pip installs the ziglang wheel -> `python -m ziglang`, which zigbuild
          # auto-discovers as the zig backend. Pin BOTH -- never `latest`.
          pip3 install --user "ziglang==${ZIG_VERSION}"
          cargo install --locked --version "${CARGO_ZIGBUILD_VERSION}" cargo-zigbuild

      - name: Build (cargo zigbuild, cross-compiled from this Linux host)
        run: cargo zigbuild --release --locked --target ${{ matrix.target }}

      - name: Package (crate-named, binstall-compatible; flat archive)
        run: |
          VERSION="${GITHUB_REF##refs/tags/v}"
          BIN="mcp-hub${{ matrix.binext }}"
          OUT="mcp-server-hub-${{ matrix.target }}-v${VERSION}.${{ matrix.ext }}"
          SRC="target/${{ matrix.target }}/release"
          if [ "${{ matrix.ext }}" = "zip" ]; then
            # Windows: flat .zip containing just mcp-hub.exe (reduced non-unix CLI)
            (cd "$SRC" && zip "$OLDPWD/$OUT" "$BIN")
          else
            # Linux: flat .tgz containing just the mcp-hub binary (no wrapping dir)
            tar czf "$OUT" -C "$SRC" "$BIN"
          fi
          sha256sum "$OUT" > "$OUT.sha256"
          echo "Packaged: $OUT"

      - name: 'Smoke test (Linux: --version; Windows: build+presence only)'
        run: |
          if [ "${{ matrix.target }}" = "x86_64-pc-windows-gnu" ]; then
            # Windows binary is a reduced non-unix CLI cross-built on Linux -- it is
            # not runnable on this host. Rely on a successful build + the .exe being
            # present in the archive (Pitfall 2). Do NOT attempt to execute it.
            test -f "target/${{ matrix.target }}/release/mcp-hub.exe" || {
              echo "ERROR: mcp-hub.exe missing from the Windows build"
              exit 1
            }
            echo "Windows reduced-CLI build present (not executed on Linux host)."
          else
            # Cross-built non-host Linux targets may not be runnable here either;
            # --version is the portable check we keep (the old start-servers smoke
            # is dropped for cross-built targets).
            BIN_PATH="target/${{ matrix.target }}/release/mcp-hub"
            if [ "${{ matrix.target }}" = "x86_64-unknown-linux-gnu" ]; then
              "$BIN_PATH" --version
            else
              echo "Cross-built ${{ matrix.target }} -- skipping execution on host; build success is the check."
              test -f "$BIN_PATH"
            fi
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.target }}
          path: |
            mcp-server-hub-*

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 4: release
  # Requires ALL build-binaries matrix targets to succeed -- no partial release.
  # Validates all 5 expected archives exist before creating the release,
  # generates SHA256SUMS.txt, and creates the GitHub Release with the new
  # crate-named assets. The macOS target and the tap-formula step are removed
  # (both deferred to v2 per CONTEXT / D-06).
  # ──────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-binaries]
    runs-on: [orangepi]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          merge-multiple: true
          path: artifacts/

      - name: Validate all 5 expected archives exist
        run: |
          VERSION="${GITHUB_REF##refs/tags/v}"
          echo "Validating release artifacts for v${VERSION}..."
          for f in \
            "mcp-server-hub-x86_64-unknown-linux-gnu-v${VERSION}.tgz" \
            "mcp-server-hub-aarch64-unknown-linux-gnu-v${VERSION}.tgz" \
            "mcp-server-hub-x86_64-unknown-linux-musl-v${VERSION}.tgz" \
            "mcp-server-hub-aarch64-unknown-linux-musl-v${VERSION}.tgz" \
            "mcp-server-hub-x86_64-pc-windows-gnu-v${VERSION}.zip"; do
            if test -f "artifacts/$f"; then
              echo "OK: $f"
            else
              echo "MISSING: $f"
              exit 1
            fi
          done
          echo "All 5 release artifacts validated."

      - name: Generate SHA256SUMS.txt
        run: |
          VERSION="${GITHUB_REF##refs/tags/v}"
          cd artifacts
          sha256sum \
            "mcp-server-hub-x86_64-unknown-linux-gnu-v${VERSION}.tgz" \
            "mcp-server-hub-aarch64-unknown-linux-gnu-v${VERSION}.tgz" \
            "mcp-server-hub-x86_64-unknown-linux-musl-v${VERSION}.tgz" \
            "mcp-server-hub-aarch64-unknown-linux-musl-v${VERSION}.tgz" \
            "mcp-server-hub-x86_64-pc-windows-gnu-v${VERSION}.zip" \
            > SHA256SUMS.txt
          echo "Generated SHA256SUMS.txt:"
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/mcp-server-hub-*.tgz
            artifacts/mcp-server-hub-*.zip
            artifacts/SHA256SUMS.txt
          generate_release_notes: true
          body: |
            ## Installation

            > The crate is published as `mcp-server-hub`; it installs a binary named **`mcp-hub`**.

            **Prebuilt binary (fastest):**
            ```bash
            cargo binstall mcp-server-hub      # downloads a prebuilt mcp-hub binary
            ```

            **From source:**
            ```bash
            cargo install mcp-server-hub       # compiles and installs the mcp-hub binary
            ```

            **Direct download:** grab the appropriate archive below and extract the `mcp-hub` binary.

            | Platform | Archive |
            |----------|---------|
            | Linux x86_64 (gnu) | `mcp-server-hub-x86_64-unknown-linux-gnu-v<version>.tgz` |
            | Linux aarch64 (gnu) | `mcp-server-hub-aarch64-unknown-linux-gnu-v<version>.tgz` |
            | Linux x86_64 (musl) | `mcp-server-hub-x86_64-unknown-linux-musl-v<version>.tgz` |
            | Linux aarch64 (musl) | `mcp-server-hub-aarch64-unknown-linux-musl-v<version>.tgz` |
            | Windows x86_64 | `mcp-server-hub-x86_64-pc-windows-gnu-v<version>.zip` |

            > **Windows** binary is a **reduced CLI** — no daemon, no web UI, no signal handling
            > (those features are Unix-only). **macOS** prebuilt binaries are **deferred to v2**.

            ## Checksums
            See `SHA256SUMS.txt` for verification.

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 5: publish-crates
  # Publishes the crate to crates.io AFTER the GitHub Release succeeds.
  # FAIL-LOUD (D-03 / HUB-05): this job is NOT marked non-blocking -- a registry
  # or token failure (e.g. CARGO_REGISTRY_TOKEN missing publish scope) now fails
  # the workflow instead of showing a false green.
  #
  # NO human-approval / environment-protection gate (D-04): crates.io publish is
  # immediate and yank-only -- there is no reviewable staging bundle to approve.
  # The deliberate v* tag + the JOB-1 dry-run preflight ARE the gate.
  # ──────────────────────────────────────────────────────────────────────────
  publish-crates:
    name: Publish to crates.io
    needs: release
    runs-on: [orangepi]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: cargo publish (requires CARGO_REGISTRY_TOKEN with publish scope)
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
